<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard User - Trash for Quota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Trash for Quota</a>
            <div class="d-flex">
                <form th:action="@{/logout}" method="post">
                    <button class="btn btn-light btn-sm fw-bold" type="submit">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card border-0 shadow-sm bg-white p-3">
                    <div class="card-body">
                        <h6 class="text-muted mb-1">Selamat Datang,</h6>
                        <h4 class="fw-bold text-primary" th:text="${user.username}">User</h4>
                        <hr>
                        <p class="mb-1 text-muted">Saldo Poin Anda:</p>
                        <h2 class="fw-bold text-success"><span th:text="${user.poin}">0</span> <small class="text-muted" style="font-size: 0.5em;">pts</small></h2>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card border-0 shadow-sm bg-white">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0 fw-bold">Tukar Poin Jadi Kuota/Pulsa</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${message}" class="alert alert-info alert-dismissible fade show" role="alert">
                            <span th:text="${message}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Nama Reward</th>
                                        <th>Provider</th>
                                        <th>Harga Poin</th>
                                        <th class="text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:if="${#lists.isEmpty(rewards)}">
                                        <td colspan="4" class="text-center text-muted py-4">Belum ada reward yang tersedia.</td>
                                    </tr>
                                    <tr th:each="r : ${rewards}">
                                        <td>
                                            <strong th:text="${r.namaReward}">Reward</strong>
                                        </td>
                                        <td>
                                            <span class="badge bg-secondary" th:text="${r.provider}">Provider</span>
                                        </td>
                                        <td class="fw-bold text-danger">
                                            <span th:text="${r.poinDibutuhkan}">0</span> Poin
                                        </td>
                                        <td class="text-center">
                                            <form th:action="@{'/user/tukar/' + ${r.idReward}}" method="post">
                                                <button type="submit" 
                                                        class="btn btn-sm btn-outline-primary px-3"
                                                        th:disabled="${user.poin < r.poinDibutuhkan}">
                                                    Tukar
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
