<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard User - Trash for Quota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .menu-card {
            transition: 0.2s;
            cursor: pointer;
            border-radius: 15px;
        }
        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .menu-icon {
            font-size: 40px;
        }
    </style>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <span class="navbar-brand fw-bold">Trash for Quota</span>
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-light btn-sm fw-bold">Logout</button>
        </form>
    </div>
</nav>

<div class="container">

    <!-- USER INFO -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h6 class="text-muted mb-1">Selamat Datang,</h6>
                <h4 class="fw-bold text-primary" th:text="${user.username}">User</h4>
            </div>
            <div class="text-end">
                <p class="mb-1 text-muted">Total Poin</p>
                <h2 class="fw-bold text-success">
                    <span th:text="${user.poin}">0</span> pts
                </h2>
            </div>
        </div>
    </div>

    <!-- MENU GRID -->
    <div class="row g-4">

        <!-- SCAN -->
        <div class="col-md-4">
            <a href="/scan" class="text-decoration-none text-dark">
                <div class="card menu-card text-center p-4 shadow-sm border-0">
                    <div class="menu-icon text-success">♻️</div>
                    <h5 class="mt-3 fw-bold">Scan Sampah</h5>
                    <p class="text-muted small">Input sampah & dapatkan poin</p>
                </div>
            </a>
        </div>

        <!-- TUKAR POIN -->
        <div class="col-md-4">
            <a href="/tukar" class="text-decoration-none text-dark">
                <div class="card menu-card text-center p-4 shadow-sm border-0">
                    <div class="menu-icon text-primary">🎁</div>
                    <h5 class="mt-3 fw-bold">Tukar Poin</h5>
                    <p class="text-muted small">Ubah poin jadi pulsa / kuota</p>
                </div>
            </a>
        </div>

        <!-- RIWAYAT -->
        <div class="col-md-4">
            <a href="/user/riwayat" class="text-decoration-none text-dark">
                <div class="card menu-card text-center p-4 shadow-sm border-0">
                    <div class="menu-icon text-secondary">📜</div>
                    <h5 class="mt-3 fw-bold">Riwayat</h5>
                    <p class="text-muted small">Lihat aktivitas & transaksi</p>
                </div>
            </a>
        </div>

        <!-- BONUS MENU (opsional biar terasa “banyak menu”) -->
        <div class="col-md-4">
            <a href="/user/profile" class="text-decoration-none text-dark">
                <div class="card menu-card text-center p-4 shadow-sm border-0">
                    <div class="menu-icon text-warning">👤</div>
                    <h5 class="mt-3 fw-bold">Profil</h5>
                    <p class="text-muted small">Kelola akun Anda</p>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/user/leaderboard" class="text-decoration-none text-dark">
                <div class="card menu-card text-center p-4 shadow-sm border-0">
                    <div class="menu-icon text-danger">🏆</div>
                    <h5 class="mt-3 fw-bold">Leaderboard</h5>
                    <p class="text-muted small">Peringkat pengguna</p>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/user/info" class="text-decoration-none text-dark">
                <div class="card menu-card text-center p-4 shadow-sm border-0">
                    <div class="menu-icon text-info">ℹ️</div>
                    <h5 class="mt-3 fw-bold">Info</h5>
                    <p class="text-muted small">Panduan & edukasi</p>
                </div>
            </a>
        </div>

    </div>

</div>

</body>
</html>
