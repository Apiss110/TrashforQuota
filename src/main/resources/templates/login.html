<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Trash for Quota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow" style="width: 400px;">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">Trash for Quota</h3>
                
                <div th:if="${param.error}" class="alert alert-danger">
                    Username atau Password salah!
                </div>

                <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}">
                </div>
                
                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>

                <div class="text-center mt-3">
                    <p class="small">Belum punya akun? <a th:href="@{/register}" class="text-decoration-none">Daftar di sini</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
