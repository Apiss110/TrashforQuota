<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tukar Poin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .produk-card {
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border: 2px solid #eee;
            transition: 0.2s;
        }

        .produk-card:hover {
            transform: scale(1.05);
            border-color: #0d6efd;
        }

        .produk-card.active {
            border-color: #0d6efd;
            background-color: #e7f1ff;
        }
        .btn-group .btn {
        padding: 10px;
        font-weight: 600;
        }
    </style>
</head>

<body class="bg-light">

<div class="container py-4">

    <a href="/dashboard" class="btn btn-outline-secondary mb-3">⬅ Kembali</a>

    <div class="card border-0 shadow-sm">
        <div class="card-body">

            <h5 class="fw-bold mb-3">🎁 Tukar Poin</h5>

            <!-- NOMOR HP -->
            <div class="mb-3">
                <label class="fw-bold">Nomor HP</label>
                <input type="text" th:value="${noHp}">
            </div>

            <!-- SWITCH -->
            <div class="d-flex justify-content-center mb-4">
                <div class="btn-group w-50 shadow-sm" role="group">
                    <button class="btn btn-primary" onclick="setJenis('pulsa')" id="btnPulsa">Pulsa</button>
                    <button class="btn btn-outline-primary" onclick="setJenis('kuota')" id="btnKuota">Kuota</button>
                </div>
            </div>

            <!-- GRID PRODUK -->
            <div class="row g-3" id="produkContainer"></div>

            <!-- BUTTON -->
            <div class="mt-4 text-end">
                <button class="btn btn-success px-4" onclick="konfirmasi()">Lanjut</button>
            </div>

        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalKonfirmasi">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Konfirmasi</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <p><b>Nomor HP:</b> <span id="confNoHp"></span></p>
                <p><b>Pilihan:</b> <span id="confProduk"></span></p>
            </div>

            <div class="modal-footer">
                <form method="post" action="/tukar">
                    <input type="hidden" name="nohp" id="inputNoHp">
                    <input type="hidden" name="produk" id="inputProduk">
                    <button type="submit" class="btn btn-success">Konfirmasi</button>
                </form>
            </div>

        </div>
    </div>
</div>

<script>
    let selectedProduk = "";
    let currentJenis = "kuota";

    const data = {
        kuota: [
        "1GB / 1 Hari (50 poin)",
        "2GB / 3 Hari (90 poin)",
        "3GB / 7 Hari (120 poin)",
        "5GB / 7 Hari (200 poin)",
        "8GB / 15 Hari (300 poin)",
        "10GB / 30 Hari (400 poin)",
        "15GB / 30 Hari (600 poin)",
        "20GB / 30 Hari (800 poin)",
        "30GB / 30 Hari (1200 poin)"
        ],
        pulsa: [
        "Pulsa 5.000 (50 poin)",
        "Pulsa 10.000 (100 poin)",
        "Pulsa 15.000 (150 poin)",
        "Pulsa 20.000 (200 poin)",
        "Pulsa 25.000 (250 poin)",
        "Pulsa 50.000 (500 poin)",
        "Pulsa 75.000 (750 poin)",
        "Pulsa 100.000 (1000 poin)"
        ]
    };

    function renderProduk(jenis) {
        const container = document.getElementById("produkContainer");
        container.innerHTML = "";

        data[jenis].forEach(item => {
            const col = document.createElement("div");
            col.className = "col-6 col-md-4";

            const card = document.createElement("div");
            card.className = "produk-card";
            card.innerText = item;

            card.onclick = () => {
                document.querySelectorAll(".produk-card").forEach(c => c.classList.remove("active"));
                card.classList.add("active");
                selectedProduk = item;
            };

            col.appendChild(card);
            container.appendChild(col);
        });
    }

    function setJenis(jenis) {
        currentJenis = jenis;

        document.getElementById("btnKuota").classList.toggle("btn-primary", jenis === "kuota");
        document.getElementById("btnKuota").classList.toggle("btn-outline-primary", jenis !== "kuota");

        document.getElementById("btnPulsa").classList.toggle("btn-primary", jenis === "pulsa");
        document.getElementById("btnPulsa").classList.toggle("btn-outline-primary", jenis !== "pulsa");

        selectedProduk = "";
        renderProduk(jenis);
    }

    function konfirmasi() {
        const nohp = document.getElementById("nohp").value;

        if (!nohp || !selectedProduk) {
            alert("Pilih produk dulu!");
            return;
        }

        document.getElementById("confNoHp").innerText = nohp;
        document.getElementById("confProduk").innerText = selectedProduk;

        document.getElementById("inputNoHp").value = nohp;
        document.getElementById("inputProduk").value = selectedProduk;

        new bootstrap.Modal(document.getElementById('modalKonfirmasi')).show();
    }

    // DEFAULT LOAD → KUOTA
    renderProduk("kuota");
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
