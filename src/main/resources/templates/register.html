<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Daftar - Trash for Quota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow" style="width: 450px;">
            <div class="card-body p-4">
                <h3 class="text-center">Daftar Akun Baru</h3>
                <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>
                
                <form th:action="@{/register}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nomor HP</label>
                        <input type="text" name="nomorHp" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Daftar Sekarang</button>
                    <div class="text-center mt-3">
                        <a th:href="@{/login}">Sudah punya akun? Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
