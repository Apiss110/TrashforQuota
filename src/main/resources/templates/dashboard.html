<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Panel - Trash for Quota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Admin Trash for Quota</span>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-12">
                <h4>Status Smart Bin</h4>
                <div class="row">
                    <div class="col-md-3" th:each="bin : ${bins}">
                        <div class="card border-primary">
                            <div class="card-body text-center">
                                <h6 th:text="${bin.lokasi}">Lokasi</h6>
                                <p class="mb-0">Kapasitas: <span th:text="${bin.totalSampah}">0</span> / <span th:text="${bin.kapasitas}">0</span> g</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-white"><strong>Log Seluruh Transaksi</strong></div>
            <div class="card-body">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>User</th>
                            <th>Jenis</th>
                            <th>Poin</th>
                            <th>Keterangan</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="t : ${recentTransactions}">
                            <td th:text="${#temporals.format(t.tanggal, 'dd-MM-yyyy HH:mm')}">Time</td>
                            <td th:text="${t.user.username}">User</td>
                            <td>
                                <span th:classappend="${t.jenisTransaksi.name() == 'SETOR_SAMPAH' ? 'badge bg-success' : 'badge bg-info'}" 
                                      th:text="${t.jenisTransaksi}">Jenis</span>
                            </td>
                            <td th:text="${t.jumlahPoin}">0</td>
                            <td th:text="${t.detail}">Detail</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
