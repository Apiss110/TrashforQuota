<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Scan Sampah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <a href="/dashboard" class="btn btn-outline-secondary mb-4">⬅ Kembali</a>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <h4 class="fw-bold mb-4">♻️ Scan Sampah</h4>

            <form th:action="@{/scan}" method="post">
                <div class="row">
                    <div class="col-md-4">
                        <label>Organik (gram)</label>
                        <input type="number" name="organik" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label>Anorganik (gram)</label>
                        <input type="number" name="anorganik" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label>B3 (gram)</label>
                        <input type="number" name="b3" class="form-control" required>
                    </div>
                </div>

                <div class="mt-4 text-end">
                    <button type="submit" class="btn btn-success px-4">
                        Hitung Poin
                    </button>
                </div>
            </form>
            <div th:if="${hasilPoin}" class="alert alert-success mt-3">
                Total Poin: <strong th:text="${hasilPoin}"></strong>
            </div>
        </div>
    </div>

</div>

</body>
</html>
